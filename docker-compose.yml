services:
  bantu-os:
    build:
      context: .
      dockerfile: Dockerfile
    image: bantu-os:latest
    container_name: bantu-os
    stdin_open: true
    tty: true
    environment:
      # Required: set your API key before running
      # OPENROUTER_API_KEY: sk-or-...
      PYTHONUNBUFFERED: "1"
      TERM: xterm-256color
    volumes:
      - bantu-data:/tmp/bantu-data
    restart: unless-stopped

volumes:
  bantu-data:
