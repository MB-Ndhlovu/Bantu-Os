name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  # ── Python ──────────────────────────────────────────────────────────────
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q pytest pytest-asyncio black ruff

      - name: Check formatting (black)
        run: black --check bantu_os/ tests/

      - name: Lint (ruff)
        run: ruff check bantu_os/ tests/

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q pytest pytest-asyncio

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ── Rust ────────────────────────────────────────────────────────────────
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Check compilation
        run: cd shell && cargo check

      - name: Run Rust tests
        run: cd shell && cargo test --lib --tests

  # ── C (init) ────────────────────────────────────────────────────────────
  c-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Compile init
        run: cd init && make clean && make