name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make clang-format
    
      - name: Python checks
        run: |
          pip install -q pytest pytest-asyncio black
          black --check bantu_os/ tests/ || true
    
      - name: C compilation check
        run: |
          cd init && make clean && make check
    
      - name: Rust compilation check
        run: |
          cd shell && cargo fmt --check && cargo check --message-format=short 2>&1 | tail -20

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run tests
        run: pip install -q pytest && python -m pytest tests/ -v --tb=short 2>&1 | tail -40
